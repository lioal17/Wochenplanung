name: GitHub Pages Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      # Nur die App veröffentlichen. Interne Dokumentation (PROJEKT.md,
      # UEBERGABE.md, PROJEKT-ZUSAMMENFASSUNG-*.md, ANALYSE-BERICHT-*.md)
      # bleibt im Repository, wird aber NICHT auf GitHub Pages ausgeliefert.
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
